version: '3.8'

services:
  shift-code-bot:
    build: .
    container_name: shift-code-bot
    restart: unless-stopped
    environment:
      - DATABASE_URL=sqlite:///data/shift_codes.db
      - LOG_LEVEL=INFO
      - ENVIRONMENT=production
      # Discord Configuration
      - DISCORD_WEBHOOK_URL=${DISCORD_WEBHOOK_URL}
      # Reddit Configuration (optional)
      - REDDIT_CLIENT_ID=${REDDIT_CLIENT_ID}
      - REDDIT_CLIENT_SECRET=${REDDIT_CLIENT_SECRET}
      - REDDIT_USER_AGENT=ShiftCodeBot/2.0
      # Monitoring
      - ALERT_WEBHOOK_URL=${ALERT_WEBHOOK_URL}
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./backups:/app/backups
      - ./config:/app/config:ro
    ports:
      - "8080:8080"  # Health check endpoint
    healthcheck:
      test: ["CMD", "python", "health_check.py", "--port", "8080"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - shift-bot-network

  # Optional: Monitoring with Prometheus (uncomment if needed)
  # prometheus:
  #   image: prom/prometheus:latest
  #   container_name: shift-bot-prometheus
  #   restart: unless-stopped
  #   ports:
  #     - "9090:9090"
  #   volumes:
  #     - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
  #   networks:
  #     - shift-bot-network

networks:
  shift-bot-network:
    driver: bridge

volumes:
  shift-bot-data:
    driver: local