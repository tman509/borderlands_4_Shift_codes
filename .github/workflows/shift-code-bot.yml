name: Shift Code Bot

on:
  schedule:
    # Run every 10 minutes
    - cron: '*/10 * * * *'
  workflow_dispatch:
    # Allow manual triggering
  push:
    branches: [ main ]
    paths:
      - 'src/**'
      - 'config/**'
      - '.github/workflows/shift-code-bot.yml'

env:
  PYTHON_VERSION: '3.11'

jobs:
  run-bot:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: ${{ env.PYTHON_VERSION }}
        cache: 'pip'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Create data directory
      run: mkdir -p data
    
    - name: Run database migrations
      run: python migrate.py migrate
      env:
        DATABASE_URL: sqlite:///data/shift_codes.db
    
    - name: Run bot (single cycle)
      run: python main.py --run-once --config config/production.json
      env:
        # Discord Configuration (set these in GitHub Secrets)
        DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        
        # Optional Reddit Configuration
        REDDIT_CLIENT_ID: ${{ secrets.REDDIT_CLIENT_ID }}
        REDDIT_CLIENT_SECRET: ${{ secrets.REDDIT_CLIENT_SECRET }}
        
        # Bot Configuration
        ENVIRONMENT: production
        LOG_LEVEL: INFO
        DATABASE_URL: sqlite:///data/shift_codes.db
    
    - name: Upload database artifact
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: shift-codes-database
        path: data/shift_codes.db
        retention-days: 30
    
    - name: Health check
      if: always()
      run: python health_check.py --json
      env:
        DATABASE_URL: sqlite:///data/shift_codes.db

  # Optional: Deploy to a server
  deploy:
    runs-on: ubuntu-latest
    needs: run-bot
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Deploy to server
      run: |
        echo "Add your deployment commands here"
        # Example: SSH to server and update the bot
        # ssh user@server 'cd /path/to/bot && git pull && docker-compose up -d'