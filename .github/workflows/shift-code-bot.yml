name: Shift Code Bot

on:
  schedule:
    # Run every 10 minutes
    - cron: '*/10 * * * *'
  workflow_dispatch:
    # Allow manual triggering

jobs:
  run-bot:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        cache: 'pip'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Download previous database
      uses: actions/download-artifact@v4
      continue-on-error: true
      with:
        name: shift-codes-database
        path: data/
    
    - name: Create data directory
      run: mkdir -p data
    
    - name: Initialize database if needed
      run: |
        if [ ! -f "data/shift_codes.db" ]; then
          echo "Creating new database..."
          python migrate.py migrate
        else
          echo "Database exists, running migrations..."
          python migrate.py migrate
        fi
      env:
        DATABASE_URL: sqlite:///data/shift_codes.db
    
    - name: Run bot (single cycle)
      run: |
        echo "Starting bot execution..."
        python main.py --run-once --config config/production.json --json
      env:
        DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        REDDIT_CLIENT_ID: ${{ secrets.REDDIT_CLIENT_ID }}
        REDDIT_CLIENT_SECRET: ${{ secrets.REDDIT_CLIENT_SECRET }}
        ENVIRONMENT: production
        LOG_LEVEL: INFO
        DATABASE_URL: sqlite:///data/shift_codes.db
    
    - name: Upload database artifact
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: shift-codes-database
        path: data/shift_codes.db
        retention-days: 30
        if-no-files-found: ignore
    
    - name: Health check
      if: always()
      run: |
        echo "Running health check..."
        python health_check.py --json || echo "Health check completed with warnings"
      env:
        DATABASE_URL: sqlite:///data/shift_codes.db