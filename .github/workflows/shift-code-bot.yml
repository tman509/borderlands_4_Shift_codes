name: Shift Code Bot

on:
  schedule:
    # Run daily at 7pm MST (2am UTC next day)
    - cron: '0 2 * * *'
  workflow_dispatch:
    # Allow manual triggering

jobs:
  run-bot:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        cache: 'pip'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Create data directory
      run: mkdir -p data
    
    - name: Download previous database
      id: download-db
      uses: actions/download-artifact@v4
      continue-on-error: true
      with:
        name: shift-codes-database
        path: data/
    
    - name: Check database status
      id: db-status
      run: |
        if [ -f "data/shift_codes.db" ]; then
          echo "database-exists=true" >> $GITHUB_OUTPUT
          echo "Database found from previous run"
        else
          echo "database-exists=false" >> $GITHUB_OUTPUT
          echo "No database found, will create new one"
        fi
    
    - name: Initialize database
      run: |
        echo "Running database migrations..."
        python migrate.py migrate
        echo "Database initialization completed"
      env:
        DATABASE_URL: sqlite:///data/shift_codes.db
    
    - name: Run bot (single cycle)
      id: run-bot
      run: |
        echo "Starting bot execution..."
        set +e  # Don't exit on error
        python main.py --run-once --config config/production.json --json
        exit_code=$?
        echo "Bot execution completed with exit code: $exit_code"
        
        # Log the result but don't fail the workflow for expected errors
        if [ $exit_code -eq 0 ]; then
          echo "Bot ran successfully"
        else
          echo "Bot encountered issues (exit code: $exit_code) - this may be normal"
          echo "Check logs for details"
        fi
        
        # Always exit 0 to prevent workflow failure
        exit 0
      env:
        DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        REDDIT_CLIENT_ID: ${{ secrets.REDDIT_CLIENT_ID }}
        REDDIT_CLIENT_SECRET: ${{ secrets.REDDIT_SECRET }}
        ENVIRONMENT: production
        LOG_LEVEL: INFO
        DATABASE_URL: sqlite:///data/shift_codes.db
    
    - name: Check database file exists
      id: check-db-file
      run: |
        if [ -f "data/shift_codes.db" ]; then
          echo "database-file-exists=true" >> $GITHUB_OUTPUT
          echo "Database file found for upload"
          ls -la data/shift_codes.db
        else
          echo "database-file-exists=false" >> $GITHUB_OUTPUT
          echo "No database file found"
        fi
    
    - name: Upload database artifact
      uses: actions/upload-artifact@v4
      if: always() && steps.check-db-file.outputs.database-file-exists == 'true'
      with:
        name: shift-codes-database
        path: data/shift_codes.db
        retention-days: 30
    
    - name: Health check
      if: always()
      run: |
        echo "Running health check..."
        set +e  # Don't exit on error
        python health_check.py --json
        health_exit_code=$?
        echo "Health check completed with exit code: $health_exit_code"
        
        # Log the result but don't fail the workflow
        if [ $health_exit_code -eq 0 ]; then
          echo "✅ System is healthy"
        elif [ $health_exit_code -eq 1 ]; then
          echo "⚠️  System has warnings"
        else
          echo "❌ System is unhealthy"
        fi
        
        # Always exit 0 to prevent workflow failure
        exit 0
      env:
        DATABASE_URL: sqlite:///data/shift_codes.db